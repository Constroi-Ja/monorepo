services:
  db:
    image: postgres:15-alpine
    container_name: constroija_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-constroija_db}
      POSTGRES_USER: ${POSTGRES_USER:-constroija_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-constroija_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-constroija_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - constroija_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: constroija_backend
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - /app/.venv  # Exclude .venv from host mount
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-constroija_db}
      - POSTGRES_USER=${POSTGRES_USER:-constroija_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-constroija_password}
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - constroija_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: constroija_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - constroija_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  constroija_network:
    driver: bridge
