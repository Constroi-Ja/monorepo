services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: constroija_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-constroija_db}
      POSTGRES_USER: ${POSTGRES_USER:-constroija_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-constroija_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-constroija_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - constroija_network

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: constroija_backend
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - /app/.venv  # Exclude .venv from host mount
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-constroija_db}
      - POSTGRES_USER=${POSTGRES_USER:-constroija_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-constroija_password}
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - constroija_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: constroija_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - constroija_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: constroija_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - constroija_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  constroija_network:
    driver: bridge
